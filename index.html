<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>birdybird</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="birdybird" />
  <meta name="mobile-web-app-capable" content="yes" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0a1628;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      touch-action: none;
    }
    canvas { display: block; }

    #topbar {
      position: fixed; top: max(env(safe-area-inset-top), 10px); left: 10px; right: 10px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 100; pointer-events: none;
    }
    .pill {
      padding: 7px 12px; border-radius: 999px;
      background: rgba(10, 22, 40, 0.6);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(96, 192, 255, 0.25);
      color: rgba(255, 255, 255, 0.85);
      font-size: 12px; font-weight: 600;
      pointer-events: auto;
    }
    .pill .dot {
      display: inline-block;
      width: 6px; height: 6px; border-radius: 50%;
      background: #ffaa44;
      margin-right: 6px;
      vertical-align: middle;
    }

    #dev-links {
      position: fixed; bottom: max(env(safe-area-inset-bottom), 10px); left: 10px;
      z-index: 100;
      display: flex; gap: 6px;
      font-size: 10px;
    }
    #dev-links a {
      padding: 4px 8px; border-radius: 6px;
      background: rgba(10, 22, 40, 0.6);
      color: #60c0ff; text-decoration: none;
      border: 1px solid rgba(96, 192, 255, 0.2);
    }
  </style>
</head>
<body>
  <div id="topbar">
    <div class="pill"><span class="dot"></span>birdybird · T002 scaffold</div>
    <div class="pill" id="fps">— fps</div>
  </div>

  <div id="dev-links">
    <a href="tilt-test.html">tilt-test</a>
    <a href="iframe-test.html">iframe-test</a>
    <a href="https://github.com/pmmathias/birdybird" target="_blank">github</a>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
